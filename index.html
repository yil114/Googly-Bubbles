*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            --sidebar-w: 220px;
            --bg: #ffffff;
            --card-bg: #ebebeb;
            --text: #1a1a1a;
            --muted: #aaaaaa;
            --gap: 10px;

            font-family: "Inter", ui-sans-serif, sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── Shell ── */

            min-height: 100vh;

        /* ── Sidebar ── */

            margin-left: var(--sidebar-w);

            display: flex;
            flex-direction: column;
            padding: 0 56px 0 56px;

        /* ── Hero ── */

            height: 58vh;
            min-height: 340px;
            background: #c8cfe8;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 40px 48px;
            border-radius: 8px;
            margin-right: var(--gap);

        .hero img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;

            object-position: center;

        .hero-text {

            z-index: 2;

            font-size: clamp(20px, 2.8vw, 32px);
            font-weight: 400;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 8px;
            letter-spacing: -0.02em;

        .hero-text p {
            font-size: 15px;
            color: rgba(255,255,255,0.75);
            font-weight: 300;
        }

        /* ── Page intro ── */
        .page-intro {
            padding: 80px 0 72px 0;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .page-intro h1 {
            font-size: clamp(20px, 3.8vw, 32px);
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1.2;
            color: var(--text);
        }

        /* ── Spacer between hero and grid ── */
        .spacer { height: 80px; }

        /* ── Grid ── */
        .grid-wrap {
            padding: 0 0 var(--gap) 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
        }

        .span-full { grid-column: 1 / 3; }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card.short { min-height: 260px; }

        .card img {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center top;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1);
            display: block;
        }

        .card img.loaded { opacity: 1; }
        .card:hover img { transform: scale(1.05); filter: blur(6px); }

        /* shimmer */
        /* card hover overlay */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.6);
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: 2;
            border-radius: 8px;

            color: var(--text);
            z-index: 3;

            font-weight: 500;

            z-index: 3;
            letter-spacing: -0.02em;

    <script type="text/babel" data-presets="react">
    const { useEffect, useRef } = React;

    function PuppetPhysicsHero() {
        const sceneRef = useRef(null);
        const mousePos = useRef({ x: 0, y: 0 });

        useEffect(() => {
            const { Engine, Render, Runner, Bodies, Composite, MouseConstraint, Mouse, Events } = Matter;
            const engine = Engine.create();
            const world = engine.world;
            const width = sceneRef.current.clientWidth;
            const height = sceneRef.current.clientHeight;

            const render = Render.create({
                element: sceneRef.current,
                engine: engine,
                options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio }
            });

            const ground    = Bodies.rectangle(width/2, height + 50, width, 100, { isStatic: true });
            const leftWall  = Bodies.rectangle(-50, height/2, 100, height, { isStatic: true });
            const rightWall = Bodies.rectangle(width + 50, height/2, 100, height, { isStatic: true });

            const palette = ['#FF5F1F', '#5D3FD3', '#1A1A1A', '#FFBF00', '#F08080', '#90EE90'];
            const traits  = ['glasses', 'hair', 'squint', 'closed-smile', 'standard', 'sad', 'surprised', 'beret', 'blush', 'freckles'];

            const bodies = Array.from({ length: 12 }).map((_, i) => {
                const radius = 80 + Math.random() * 30;
                const spawnY = -radius - (i * 180) - Math.random() * 200;
                return Bodies.circle(radius + Math.random() * (width - radius * 2), spawnY, radius, {
                    restitution: 0.45, friction: 0.15, frictionAir: 0.01,
                    render: { fillStyle: palette[i % palette.length], trait: traits[i % traits.length] }
                });
            });

            Composite.add(world, [ground, leftWall, rightWall, ...bodies]);

            const onMouseMove = (e) => {
                const rect = sceneRef.current.getBoundingClientRect();
                mousePos.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };
            window.addEventListener('mousemove', onMouseMove);

            Events.on(render, 'afterRender', () => {
                const ctx = render.context;
                bodies.forEach(body => {
                    const { x, y } = body.position;
                    const r = body.circleRadius;
                    const trait = body.render.trait;
                    const isDark = body.render.fillStyle === '#1A1A1A' || body.render.fillStyle === '#5D3FD3';

                    const dx = mousePos.current.x - x;
                    const dy = mousePos.current.y - y;
                    const angle = Math.atan2(dy, dx);
                    const faceIntensity = Math.min(r * 0.3, Math.sqrt(dx*dx + dy*dy) / 12);
                    const faceX = Math.cos(angle) * faceIntensity;
                    const faceY = Math.sin(angle) * faceIntensity;
                    const pupilX = Math.cos(angle) * (r * 0.08);
                    const pupilY = Math.sin(angle) * (r * 0.08);

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(body.angle);

                    if (trait === 'beret') {
                        ctx.save();
                        ctx.translate(r * 0.2, -r * 0.7);
                        ctx.rotate(0.4);
                        ctx.fillStyle = '#FFBF00';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, r * 0.6, r * 0.35, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillRect(-2, -r * 0.35, 4, r * 0.1);
                        ctx.restore();
                    }

                    ctx.save();
                    ctx.translate(faceX, faceY);
                    ctx.fillStyle = isDark ? 'white' : 'black';
                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = r * 0.06;
                    ctx.lineCap = 'round';

                    const eyeY = -r * 0.1;
                    const eyeSpace = r * 0.28;
                    const eyeR = r * 0.22;
                    const pupilR = r * 0.05;

                    const drawEyeSet = (isGlassStyle) => {
                        const drawSingleEye = (ox) => {
                            ctx.fillStyle = "white";
                            ctx.beginPath(); ctx.arc(ox, eyeY, isGlassStyle ? eyeR : r*0.12, 0, Math.PI*2); ctx.fill();
                            if (isGlassStyle) { ctx.strokeStyle = isDark ? 'white' : 'black'; ctx.stroke(); }
                            ctx.fillStyle = "black";
                            ctx.beginPath(); ctx.arc(ox + pupilX, eyeY + pupilY, pupilR, 0, Math.PI*2); ctx.fill();
                        };
                        drawSingleEye(-eyeSpace); drawSingleEye(eyeSpace);
                        if (isGlassStyle) {
                            ctx.beginPath(); ctx.moveTo(-eyeSpace + eyeR, eyeY); ctx.lineTo(eyeSpace - eyeR, eyeY); ctx.stroke();
                        }
                    };

                    if (['glasses', 'beret', 'blush', 'freckles'].includes(trait)) {
                        drawEyeSet(true);
                    } else if (trait === 'squint') {
                        const s = r * 0.08;
                        [-eyeSpace, eyeSpace].forEach(ox => {
                            ctx.beginPath(); ctx.moveTo(ox-s, eyeY-s); ctx.lineTo(ox+s, eyeY+s); ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(ox+s, eyeY-s); ctx.lineTo(ox-s, eyeY+s); ctx.stroke();
                        });
                    } else { drawEyeSet(false); }

                    if (trait === 'blush') {
                        ctx.fillStyle = '#FF69B4'; ctx.globalAlpha = 0.6;
                        ctx.beginPath(); ctx.arc(-r*0.5, r*0.1, r*0.12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(r*0.5, r*0.1, r*0.12, 0, Math.PI*2); ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                    if (trait === 'freckles') {
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        for (let i = 0; i < 5; i++) {
                            ctx.beginPath(); ctx.arc(r*0.45 + (i*3), r*0.1 + (i%2*4), 1.5, 0, Math.PI*2); ctx.fill();
                        }
                    }

                    const mouthY = r * 0.2;
                    ctx.fillStyle = isDark ? 'white' : 'black';
                    if (trait === 'blush') {
                        ctx.beginPath(); ctx.arc(0, mouthY, r*0.15, 0, Math.PI); ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(0, mouthY, r * 0.15, 0, Math.PI, false); ctx.stroke();
                    }

                    ctx.restore();
                    ctx.restore();
                });
            });

            const mouse = Mouse.create(render.canvas);
            mouse.element.removeEventListener("mousewheel", mouse.mousewheel);
            Composite.add(world, MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.2, render: { visible: false } } }));
            Render.run(render);
            Runner.run(Runner.create(), engine);

            let textShown = false;
            const settleCheck = setInterval(() => {
                if (textShown) return;
                const allLow = bodies.every(b => Math.abs(b.velocity.y) < 1.5 && b.position.y > height * 0.3);
                if (allLow) {
                    textShown = true; clearInterval(settleCheck);
                    const el = document.getElementById("hero-text");
                    if (el) el.style.opacity = "1";
                }
            }, 200);
            setTimeout(() => {
                if (!textShown) {
                    textShown = true;
                    const el = document.getElementById("hero-text");
                    if (el) el.style.opacity = "1";
                }
            }, 4000);

            return () => { window.removeEventListener('mousemove', onMouseMove); Render.stop(render); Engine.clear(engine); render.canvas.remove(); };
        }, []);

        return <div ref={sceneRef} style={{position:'absolute', top:0, right:0, width:'38%', height:'100%', overflow:'hidden'}} />;
    }

    function Img({ src, alt }) {
        return (
            <img
                src={src}
                alt={alt}
                loading="lazy"
                decoding="async"
                onLoad={e => e.target.classList.add('loaded')}
            />
        );
    }

                        </div>
                        <div>
                            <h1>Hi, I'm Yi. I research and design experiences that turn complex workflows into something that just feels natural.</h1>
                            <p style={{marginTop: '20px', fontSize: '14px', fontWeight: '300', color: 'var(--muted)', letterSpacing: '0.01em'}}>Previously designed & researched @ Volvo Group, Ricoh USA, Dexcom</p>
                            <p style={{marginTop: '8px', fontSize: '14px', fontWeight: '300', color: 'var(--muted)', letterSpacing: '0.01em'}}>Studied Human-Computer Interaction @ Cornell University & UC San Diego</p>
                        </div>
                    </div>

                    {/* Product Design Section */}
                    <div className="grid-wrap">
                        <div className="grid">

                            {/* Volvo */}
                            <a href="volvo-smartwatch-case-study.html" className="card-link">
                                <div className="card">
                                    <div className="card-overlay"></div>
                                    <span className="card-label">Volvo Group →</span>
                                    <span className="card-hover-title">Volvo Group</span>
                                    <span className="card-tag">Wearable AI</span>
                                    <Img src="Images/Volvo/Volvo-Preview.jpg" alt="Volvo Smartwatch AI" />
                                </div>
                            </a>

                            {/* Ricoh */}
                            <a href="ricoh_casestudy.html" className="card-link">
                                <div className="card">
                                    <div className="card-overlay"></div>
                                    <span className="card-label">Ricoh USA →</span>
                                    <span className="card-hover-title">Ricoh Insurance Form</span>
                                    <span className="card-tag">B2B SaaS</span>
                                    <Img src="Ricoh-Preview.jpg" alt="Ricoh SaaS Redesign" />
                                </div>
                            </a>

                            {/* UCSD Library — coming soon */}
                            <div className="card soon">
                                <div className="card-overlay"></div>
                                <span className="card-label">UC San Diego Library →</span>
                                <span className="card-hover-title">UC San Diego Library</span>
                                <span className="card-tag">Accessibility · Soon</span>
                                <Img src="Images/UC San Diego Library Case Study.jpg" alt="UCSD Library" />
                            </div>

                            {/* Dexcom */}
                            <a href="dexcom_casestudy.html" className="card-link">
                                <div className="card">
                                    <div className="card-overlay"></div>
                                    <span className="card-label">Dexcom Research →</span>
                                    <span className="card-hover-title">Dexcom Research</span>
                                    <span className="card-tag">UX Research</span>
                                    <Img src="Images/dexcom/Dexcom Case Study.jpg" alt="Dexcom UX Research" />
                                </div>
                            </a>

                        </div>
                    </div>

                    {/* AI Design Section */}
                    <div id="ai-design" className="grid-wrap" style={{paddingTop: '100px'}}>
                        <div className="section-heading">
                            <h1 style={{marginBottom:'10px'}}>AI Design</h1>
                            <p style={{marginBottom:'40px'}}>Experiments at the intersection of artificial intelligence and design craft.</p>
                        </div>
                        <div className="grid">

                          

                            {/* Froggy Drawing */}
                            <a href="https://yil114.github.io/fog-project" target="_blank" rel="noopener noreferrer" className="card-link">
                                <div className="card">
                                    <span className="card-tag">Interaction · Live 2026</span>
                                    <Img src="Images/project-fog-demo.gif" alt="Froggy Drawing" />
                                </div>
                                <div className="card-caption">
                                    <div style={{fontSize:'20px', fontWeight:'500', color:'var(--text)', marginBottom:'4px'}}>Froggy Drawing →</div>
                                    <div className="card-caption-title">Non-touch Interaction Design</div>
                                    <div className="card-caption-tools" style={{fontSize:'50px'}}>
                                        {['Gemini','React','AI Agent'].map(t => <span key={t}>{t}</span>)}
                                    </div>
                                </div>
                            </a>

                            {/* Goldfish Pond */}
                            <a href="https://yil114.github.io/pond-goldfish-interaction/" target="_blank" rel="noopener noreferrer" className="card-link">
                                <div className="card">
                                    <span className="card-tag">Zero UI · Live 2026</span>
                                    <Img src="Images/GoldFish_Preview.jpg" alt="Goldfish Pond" />
                                </div>
                                <div className="card-caption">
                                    <div style={{fontSize:'20px', fontWeight:'500', color:'var(--text)', marginBottom:'4px'}}>金鱼池塘 →</div>
                                    <div className="card-caption-title">Multimodal AI Experience</div>
                                    <div className="card-caption-tools">
                                        {['Claude Design','ChatGPT'].map(t => <span key={t}>{t}</span>)}

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
